    - generic [ref=e1814]:
      - heading "Troubleshooting" [level=2] [ref=e1815]
      - list [ref=e1816]:
        - listitem [ref=e1817]: "If the client fails with model routing, use explicit provider/model (for example: gh/gpt-5.1-codex)."
        - listitem [ref=e1818]: If you receive ambiguous model errors, pick a provider prefix instead of a bare model ID.
        - listitem [ref=e1819]: For GitHub Codex-family models, keep model as gh/codex-model; router selects /responses automatically.
        - listitem [ref=e1820]: Use Dashboard > Providers > Test Connection before testing from IDEs or external clients.
        - listitem [ref=e1821]: If a provider shows circuit breaker open, wait for the cooldown or check Health page for details.
        - listitem [ref=e1822]: For OAuth providers, re-authenticate if tokens expire. Check the provider card status indicator.
